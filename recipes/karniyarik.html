    <p>
      Karnıyarık (lit. 'riven belly' in Turkish) is a dish found in Turkish
      cuisine[1] consisting of eggplant stuffed with a mix of sautéed chopped
      onions, garlic, black pepper, tomatoes, optional green pepper, parsley and
      ground meat. The dish is often served with rice.
